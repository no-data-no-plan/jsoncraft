# Badge: ![CI](https://github.com/USER/REPO/actions/workflows/ci.yml/badge.svg)
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

      - name: Build
        # Includes scripts/check-svelte-state.sh guard.
        run: npm run build
